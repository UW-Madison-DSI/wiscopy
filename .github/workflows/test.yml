name: Test Workflow

on:
  [pull_request, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.66.0
      - name: Install dependencies
        run: |
          pixi install
      - name: Test with pixi
        run: |
          pixi run test
